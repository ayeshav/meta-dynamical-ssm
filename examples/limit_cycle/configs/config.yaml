defaults:
  - model: meta_ssm
  - _self_

seed: 42
device: cpu

data:
  num_trials: 128
  num_timepoints: 300
  observation_dims: [20, 30, 40, 50]
  angular_velocities: [-5.0, -2.5, 2.5, 5.0]
  latent_dim: 2
  radius_scale: 2.0
  dt: 0.01
  process_noise: 0.5
  observation_noise: 0.1
  stride: 3

training:
  batch_size: 32
  steps: 500
  lr: 0.001
  p_mask: 0.2
  log_every: 10
  output_dir: .

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
